-<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE RAT - Restricted Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06080d;
            --accent: #00ff88;
            --text: #e6edf3;
            --border: rgba(255, 255, 255, 0.08);
        }
        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .login-card {
            background: #0d1117;
            border: 1px solid var(--border);
            padding: 2.5rem;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }
        p {
            color: #8b949e;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            color: #484f58;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        input {
            width: 100%;
            background: #161b22;
            border: 1px solid var(--border);
            padding: 0.8rem 1rem;
            border-radius: 10px;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            text-align: center;
            letter-spacing: 4px;
        }
        input:focus {
            border-color: var(--accent);
        }
        button {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 0.8rem;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        button:hover {
            background: #00cc6a;
            transform: translateY(-1px);
        }
        .error-msg {
            color: #ff4757;
            font-size: 0.8rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>⚡ ELITE RAT</h1>
        <p>Remote Administration Console</p>
        <form id="login-form">
            <div class="input-group">
                <label>Access Code</label>
                <input type="password" id="access-code" placeholder="••••" maxlength="4">
            </div>
            <button type="submit">AUTHENTICATE</button>
            <div id="error-msg" class="error-msg">INVALID ACCESS CODE</div>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('access-code').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            });
            if (res.ok) {
                window.location.href = '/';
            } else {
                document.getElementById('error-msg').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('error-msg').style.display = 'none';
                }, 2000);
            }
        });
    </script>
</body>
</html>
